name: Competitive Intelligence Monitor

# Runs every weekday at 08:00 UTC, and on demand from the Actions tab.
on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: competitive-intelligence-monitor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist snapshots between runs so the monitor remembers what it has
      # already seen and only surfaces genuinely new changes.
      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: competitive-intelligence-monitor/data/snapshots
          key: ci-monitor-snapshots

      # config.yaml is gitignored (private watchlist). If you haven't committed
      # one, fall back to the example so the job still runs end to end.
      - name: Ensure config exists
        run: test -f config.yaml || cp config.example.yaml config.yaml

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python monitor.py --config config.yaml

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest
          path: competitive-intelligence-monitor/digests/
          if-no-files-found: ignore
